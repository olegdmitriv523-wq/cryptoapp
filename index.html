<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<title>United Ukraine</title>
<link rel="stylesheet" href="app.css">

<style>
body {
margin:0;
background:#0b0f1a;
color:white;
font-family:Arial;
padding-bottom:120px;
}

/* LOGO */
.logo img {
width:120px;
display:block;
margin:10px auto;
}

/* HEADER */
.header {
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
}

.profile {
display:flex;
align-items:center;
gap:10px;
}

.avatar {
width:40px;
height:40px;
border-radius:50%;
overflow:hidden;
background:#222;
cursor:pointer;
}

.avatar img {
width:100%;
height:100%;
object-fit:cover;
}

/* BUTTONS */
.logout {
background:red;
padding:8px 15px;
border-radius:10px;
cursor:pointer;
}

.balance {
font-size:22px;
padding:10px;
}

.actions {
display:flex;
justify-content:space-around;
margin:10px 0;
}

.btn {
background:#111;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
font-size:16px;
}

/* COINS */
.row {
display:flex;
justify-content:space-between;
padding:14px;
border-bottom:1px solid #222;
cursor:pointer;
font-size:16px;
}

.green {color:lime;}
.red {color:red;}

/* NAV (ЗБІЛЬШИВ) */
.navbar {
position:fixed;
bottom:0;
width:100%;
background:#000;
display:flex;
justify-content:space-around;
padding:15px 0;
}

.nav-item {
color:#888;
font-size:16px;
text-align:center;
cursor:pointer;
flex:1;
}

.nav-icon {
display:inline-block;
font-size:54px;
line-height:1;
margin-bottom:6px;
}

.nav-item.active {
color:orange;
}
</style>

</head>

<body>

<script>

// ===== CONFIG =====
const API_URL = "https://cryptoapp-eqc5.onrender.com";

// 🔐 AUTH CHECK
let token = localStorage.getItem("token");

if(!token){
location.href = "login.html";
}

</script>

<div class="logo">
<img src="logo.png">
</div>

<div class="header">

<div class="profile">

<div class="avatar" onclick="uploadPhoto()">
<img id="avatarImg">
</div>

<div>
<div id="userIdText"></div>
<div id="wallet"></div>
</div>

</div>

<div class="logout" onclick="logout()">Вийти</div>

</div>

<div id="balance" class="balance"></div>

<div class="actions">
<div class="btn" onclick="goDeposit()">Поповнити</div>
<div class="btn" onclick="goWithdraw()">Вивести</div>
</div>

<div id="list"></div>

<div class="navbar">
<div class="nav-item active" onclick="goHome()"><span class="nav-icon">🏠</span><br>Додому</div>
<div class="nav-item" onclick="goTrade()"><span class="nav-icon">📊</span><br>Трейд</div>
<div class="nav-item" onclick="goAssets()"><span class="nav-icon">💼</span><br>Активи</div>
<div class="nav-item" onclick="goInfo()"><span class="nav-icon">ℹ️</span><br>Інфо</div>
</div>

<script>

// ===== LOAD USER =====
async function loadUser(){
try{

let res = await fetch(API_URL + "/me", {
headers:{ Authorization: token }
});

let user = await res.json();

console.log(user);

// 🔥 ВИПРАВЛЕНО ТУТ
document.getElementById("wallet").innerText =
user.wallet_address || "Нема гаманця";

document.getElementById("userIdText").innerText =
"ID: " + user.id;

let balance = user.balance || 0;
let deposit = user.deposit || 0;

let profit = balance - deposit;
let percent = deposit > 0 ? (profit / deposit) * 100 : 0;

let color = percent >= 0 ? "green" : "red";

document.getElementById("balance").innerHTML =
`$${balance.toFixed(2)} <span class="${color}">${percent.toFixed(2)}%</span>`;

}catch(e){
localStorage.removeItem("token");
location.href = "login.html";
}
}

// ===== COINS =====
async function loadCoins(){
try{

let res = await fetch(
"https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=15"
);

let data = await res.json();

let html = "";

data.forEach(c=>{
let color = c.price_change_percentage_24h >=0 ? "green":"red";

html += `
<div class="row">
<div>${c.symbol.toUpperCase()}</div>
<div>$${c.current_price} <span class="${color}">
${c.price_change_percentage_24h.toFixed(2)}%
</span></div>
</div>
`;
});

document.getElementById("list").innerHTML = html;

}catch(e){
console.log("coins error");
}
}

// ===== NAV =====
function goHome(){location.href="index.html";}
function goTrade(){location.href="trade.html";}
function goAssets(){location.href="assets.html";}
function goInfo(){location.href="info.html";}
function goDeposit(){location.href="deposit.html";}
function goWithdraw(){location.href="withdraw.html";}

// ===== LOGOUT =====
function logout(){
localStorage.removeItem("token");
location.href = "login.html";
}

// ===== AVATAR =====
function uploadPhoto(){
let input = document.createElement("input");
input.type="file";

input.onchange = e=>{
let reader = new FileReader();
reader.onload = ()=>{
localStorage.setItem("avatar", reader.result);
document.getElementById("avatarImg").src = reader.result;
};
reader.readAsDataURL(e.target.files[0]);
};

input.click();
}

// ===== LOAD AVATAR =====
let avatar = localStorage.getItem("avatar");
if(avatar){
document.getElementById("avatarImg").src = avatar;
}

// ===== INIT =====
loadUser();
loadCoins();
setInterval(loadCoins,10000);

</script>

<script src="app-nav.js"></script>
</body>
</html>
