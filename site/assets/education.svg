<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" role="img" aria-label="Crypto education illustration">
  <defs>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#f5c451"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="760" height="460" rx="34" fill="#07111f"/>
  <g transform="translate(82 70)">
    <rect width="596" height="320" rx="30" fill="url(#card)" stroke="#334155"/>
    <rect x="34" y="38" width="220" height="24" rx="12" fill="url(#accent)"/>
    <rect x="34" y="88" width="500" height="18" rx="9" fill="#334155"/>
    <rect x="34" y="122" width="430" height="18" rx="9" fill="#1e293b"/>
    <rect x="34" y="156" width="470" height="18" rx="9" fill="#1e293b"/>
    <g transform="translate(34 210)">
