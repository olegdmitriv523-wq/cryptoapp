    </g>
    <g transform="translate(220 210)">
      <rect width="150" height="72" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-opacity=".5"/>
      <text x="75" y="44" text-anchor="middle" font-family="Arial" font-size="24" font-weight="900" fill="#38bdf8">Risk</text>
    </g>
    <g transform="translate(406 210)">
      <rect width="150" height="72" rx="18" fill="#0f172a" stroke="#22c55e" stroke-opacity=".5"/>
