<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Адмінпанель</title>
<link rel="stylesheet" href="app.css">
<script src="language-boot.js"></script>
<style>
body { margin:0; padding:20px; font-family:Arial,sans-serif; }
.admin-wrap { max-width:1100px; margin:auto; }
h1 { text-align:center; }
.tabs { display:flex; flex-wrap:wrap; gap:8px; margin:20px 0; }
.tabs button { width:auto; padding:10px 14px; border:0; border-radius:8px; background:#273248; color:white; cursor:pointer; }
.tabs button.active { background:var(--accent); color:#111; }
.section { display:none; }
.section.active { display:block; }
.card { margin:10px 0; padding:16px; border:1px solid #273248; border-radius:12px; background:var(--panel); }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:8px; }
.label { color:var(--muted); font-size:12px; }
.controls { display:flex; gap:8px; margin-top:12px; }
.controls input { width:140px; padding:9px; border:1px solid #334155; border-radius:7px; background:#0b1220; color:white; }
.wallet-input { width:min(100%,420px); padding:9px; border:1px solid #334155; border-radius:7px; background:#0b1220; color:white; }
.controls button,.signal-actions button { width:auto; padding:9px 12px; border:0; border-radius:7px; cursor:pointer; }
.user-edit { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:8px; margin-top:14px; padding-top:12px; border-top:1px solid #273248; }
.user-edit label { display:grid; gap:4px; color:var(--muted); font-size:12px; }
.user-edit input { width:100%; box-sizing:border-box; padding:9px; border:1px solid #334155; border-radius:7px; background:#0b1220; color:white; }
.user-edit-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.user-edit-actions button { width:auto; padding:9px 12px; border:0; border-radius:7px; cursor:pointer; }
.approve { background:var(--success); color:#04130a; }
.reject { background:var(--danger); color:white; }
.pending { color:var(--accent); }
.approved,.done,.rewarded { color:var(--success); }
.rejected { color:var(--danger); }
.tree { margin-left:20px; padding-left:14px; border-left:2px solid #334155; }
.empty { padding:18px; color:var(--muted); text-align:center; }
.access { max-width:420px; margin:20px auto; text-align:center; }
.access input { width:100%; padding:11px; margin:10px 0; border:1px solid #334155; border-radius:8px; background:#0b1220; color:white; }
.access button { padding:10px 18px; border:0; border-radius:8px; background:var(--accent); color:#111; cursor:pointer; }
.search-panel { margin:12px 0 18px; padding:14px; border:1px solid #273248; border-radius:12px; background:var(--panel); }
.search-panel input { width:100%; box-sizing:border-box; padding:11px; border:1px solid #334155; border-radius:8px; background:#0b1220; color:white; }
.delete-btn { background:#7f1d1d; color:white; }
.muted-note { color:var(--muted); font-size:12px; margin-top:8px; }
.support-thread { display:grid; gap:10px; margin-top:12px; }
.support-line { max-width:82%; padding:10px 12px; border-radius:13px; background:#172033; color:#e5e7eb; line-height:1.45; white-space:pre-wrap; }
.support-line.user { margin-left:auto; background:#2563eb; color:white; }
.support-line.support { background:#064e3b; }
.support-line small { display:block; margin-top:5px; color:#cbd5e1; font-size:11px; }
.support-reply { display:grid; gap:8px; margin-top:12px; }
.support-reply textarea { width:100%; min-height:76px; resize:vertical; padding:10px; border:1px solid #334155; border-radius:8px; background:#0b1220; color:white; }
.support-reply button { width:auto; padding:10px 14px; border:0; border-radius:8px; background:var(--accent); color:#111; font-weight:800; cursor:pointer; }
.file-upload { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; align-items:center; }
.file-upload input { max-width:100%; color:#e5e7eb; }
.file-upload button { width:auto; padding:9px 12px; border:0; border-radius:7px; background:var(--accent); color:#111; cursor:pointer; }
</style>
</head>
<body data-no-nav="true">
<main class="admin-wrap">
  <h1>Адмінпанель</h1>
  <section class="card access" id="adminAccess">
    <h2>Вхід адміністратора</h2>
    <input id="adminKeyInput" type="password" autocomplete="current-password" placeholder="Код доступу">
    <button type="button" onclick="loginAdmin()">Увійти</button>
    <div class="empty" id="accessMessage"></div>
  </section>
  <div id="adminContent" hidden>
    <div class="tabs">
      <button class="active" data-tab="users">Користувачі</button>
      <button data-tab="signals">Типові сигнали</button>
      <button data-tab="walletRequests">Гаманці</button>
      <button data-tab="deposits">Поповнення</button>
      <button data-tab="withdrawals">Виведення</button>
      <button data-tab="profileRequests">Зміни даних</button>
      <button data-tab="support">Підтримка</button>
      <button data-tab="satellites">Структура сателітів</button>
    </div>
    <div class="search-panel">
      <input id="adminSearch" type="search" placeholder="Пошук: ID, email, ім'я, нікнейм, тип заявки, статус, сума">
      <div class="muted-note">Пошук працює по користувачах, заявках і структурі сателітів.</div>
    </div>
    <section class="section active" id="users"></section>
    <section class="section" id="signals"></section>
    <section class="section" id="walletRequests"></section>
    <section class="section" id="deposits"></section>
    <section class="section" id="withdrawals"></section>
    <section class="section" id="profileRequests"></section>
    <section class="section" id="support"></section>
    <section class="section" id="satellites"></section>
  </div>
</main>
<script>
const API_URL = ["localhost", "127.0.0.1"].includes(location.hostname) ? location.origin : "https://cryptoapp-eqc5.onrender.com";
let adminKey = sessionStorage.getItem("admin_key") || "";
let allUsers = [];
let allSignals = [];
let allReferrals = [];
let allSupport = [];
let depositAddressStatus = null;
const adminFetch = (path, options = {}) => fetch(API_URL + path, {
  ...options,
  headers: { ...(options.headers || {}), "X-Admin-Key": adminKey }
});
const escapeHtml = value => String(value ?? "-").replace(/[&<>'"]/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[char]));
const money = value => Number(value || 0).toFixed(2);
const displayId = value => value ? "1568" + String(value).padStart(4, "0").slice(-4) : "-";
const searchText = () => (document.getElementById("adminSearch")?.value || "").trim().toLowerCase();
const searchable = values => values.map(value => String(value ?? "").toLowerCase()).join(" ");
const matchesSearch = text => !searchText() || text.includes(searchText());

async function loginAdmin() {
  adminKey = document.getElementById("adminKeyInput").value.trim();
  const response = await adminFetch("/admin/users");
  if (!response.ok) {
    document.getElementById("accessMessage").textContent = "Невірний код або ADMIN_KEY не налаштований на Render.";
    window.appTranslate?.translatePage();
    return;
  }
  sessionStorage.setItem("admin_key", adminKey);
  document.getElementById("adminAccess").hidden = true;
  document.getElementById("adminContent").hidden = false;
  await refresh();
  window.appTranslate?.translatePage();
}

document.querySelectorAll("[data-tab]").forEach(button => button.addEventListener("click", () => {
  document.querySelectorAll("[data-tab], .section").forEach(element => element.classList.remove("active"));
  button.classList.add("active");
  document.getElementById(button.dataset.tab).classList.add("active");
}));
document.getElementById("adminSearch").addEventListener("input", () => {
  renderUsers(allUsers);
  renderSignals(allSignals);
  renderSatellites(allReferrals);
  renderSupport(allSupport);
});

async function loadUsers() {
  const response = await adminFetch("/admin/users");
  if (response.status === 401 || response.status === 503) throw new Error("admin-auth");
  allUsers = await response.json();
  renderUsers(allUsers);
}

function renderUsers(users) {
  const filtered = users.filter(user => matchesSearch(searchable([
    user.id, user.display_id, user.fullname, user.nickname, user.email, user.phone, user.country, user.balance, user.deposit, user.wallet_address, user.referrer_id
  ])));
  document.getElementById("users").innerHTML = filtered.length ? filtered.map(user => `
    <article class="card">
      <div class="grid">
        <div><span class="label">ID</span><br>${user.display_id || displayId(user.id)}</div>
        <div><span class="label">Ім'я</span><br>${escapeHtml(user.fullname)}</div>
        <div><span class="label">Нікнейм</span><br>${escapeHtml(user.nickname)}</div>
        <div><span class="label">Email</span><br>${escapeHtml(user.email)}</div>
        <div><span class="label">Телефон</span><br>${escapeHtml(user.phone)}</div>
        <div><span class="label">Країна</span><br>${escapeHtml(user.country)}</div>
        <div><span class="label">Баланс</span><br>$${money(user.balance)}</div>
        <div><span class="label">Депозит</span><br>$${money(user.deposit)}</div>
        <div><span class="label">Персональний гаманець</span><br>${escapeHtml(user.wallet_address || "-")}</div>
        <div><span class="label">Запрошений користувачем</span><br>${displayId(user.referrer_id)}</div>
        <div><span class="label">Сателіти</span><br>${user.satellites || 0}</div>
      </div>
      <div class="user-edit">
        <label>Повне ім'я<input id="edit-fullname-${user.id}" value="${escapeHtml(user.fullname || "")}"></label>
        <label>Нікнейм<input id="edit-nickname-${user.id}" value="${escapeHtml(user.nickname || "")}"></label>
        <label>Email<input id="edit-email-${user.id}" type="email" value="${escapeHtml(user.email || "")}"></label>
        <label>Телефон<input id="edit-phone-${user.id}" value="${escapeHtml(user.phone || "")}"></label>
        <label>Країна<input id="edit-country-${user.id}" value="${escapeHtml(user.country || "")}"></label>
        <label>Баланс<input id="edit-balance-${user.id}" type="number" step="0.01" value="${Number(user.balance || 0)}"></label>
        <label>Депозит<input id="edit-deposit-${user.id}" type="number" step="0.01" value="${Number(user.deposit || 0)}"></label>
        <label>Реферер ID<input id="edit-referrer-${user.id}" value="${user.referrer_id ? displayId(user.referrer_id) : ""}" placeholder="15680001 або пусто"></label>
        <label>Персональний гаманець<input id="edit-wallet-${user.id}" value="${escapeHtml(user.wallet_address || "")}" placeholder="Адреса гаманця"></label>
      </div>
      <div class="user-edit-actions">
        <button class="approve" onclick="updateUser(${user.id})">Зберегти дані</button>
        <button class="approve" onclick="saveUserWalletOnly(${user.id})">Зберегти тільки гаманець</button>
        <button class="delete-btn" onclick="deleteUser(${user.id}, '${escapeHtml(user.display_id || displayId(user.id))}')">Видалити користувача</button>
      </div>
      <div class="controls">
        <input id="balance-${user.id}" type="number" step="0.01" placeholder="Сума до балансу">
        <button onclick="changeBalance(${user.id}, 'add')">Швидко додати баланс</button>
      </div>
    </article>
  `).join("") : '<div class="empty">Користувачів немає</div>';
  window.appTranslate?.translatePage();
}

async function updateUser(userId) {
  const value = name => document.getElementById(`edit-${name}-${userId}`).value.trim();
  const payload = {
    user_id: userId,
    fullname: value("fullname"),
    nickname: value("nickname"),
    email: value("email"),
    phone: value("phone"),
    country: value("country"),
    balance: Number(value("balance")),
    deposit: Number(value("deposit")),
    referrer_id: value("referrer"),
    wallet_address: value("wallet")
  };
  const response = await adminFetch("/admin/update-user", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });
  const result = await response.json().catch(() => ({}));
  if (!result.success) return alert(result.message || "Не вдалося зберегти дані користувача");
  await refresh();
}

async function saveUserWalletOnly(userId) {
  const wallet = document.getElementById(`edit-wallet-${userId}`).value.trim();
  if (!wallet) return alert("Впишіть гаманець");
  const response = await adminFetch("/admin/manual-wallet", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user_id:userId, wallet})
  });
  const result = await response.json().catch(() => ({}));
  if (!result.success) return alert(result.message || "Не вдалося зберегти гаманець");
  await refresh();
}

async function changeBalance(userId, mode) {
  const amount = Number(document.getElementById(`balance-${userId}`).value);
  if (!Number.isFinite(amount)) return alert("Введіть суму");
  await adminFetch(`/admin/${mode === "add" ? "add-balance" : "set-balance"}`, {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({user_id:userId, amount})
  });
  await loadUsers();
}

async function deleteUser(userId, displayIdText) {
  if (!confirm(`Видалити користувача #${displayIdText}? Буде видалено акаунт і його заявки/історію.`)) return;
  const response = await adminFetch("/admin/delete-user", {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({user_id:userId})
  });
  const result = await response.json().catch(() => ({}));
  if (!result.success) return alert(result.message || "Не вдалося видалити користувача");
  await refresh();
}

const signalNames = {
  register:"Реєстрація", deposit:"Поповнення", withdraw:"Виведення",
  wallet_create:"Створення гаманця",
  quiz_1:"Тест 1", quiz_2:"Тест 2", quiz_3:"Тест 3", quiz_4:"Тест 4", quiz_5:"Тест 5",
  trade_main:"Основна торгівля", trade_satellite_1:"Сателіт 1", trade_satellite_2:"Сателіт 2",
  trade_satellite_3:"Сателіт 3", trade_satellite_4:"Сателіт 4", trade_satellite_5:"Сателіт 5",
  profile_update:"Зміна даних користувача", email_update:"Зміна електронної пошти"
};

function signalDetails(signal) {
  if (signal.type === "deposit") {
    try {
      const details = JSON.parse(signal.wallet || "{}");
      if (details && typeof details === "object" && !Array.isArray(details)) {
        return `<b>Гаманець для поповнення:</b> ${escapeHtml(details.deposit_wallet || signal.wallet || "-")}`;
      }
    } catch {}
    return `<b>Гаманець для поповнення:</b> ${escapeHtml(signal.wallet)}`;
  }
  if (signal.type === "withdraw") return `<b>Гаманець для виводу:</b> ${escapeHtml(signal.wallet)}`;
  if (signal.type === "wallet_create") {
    const wallet = signal.wallet && signal.wallet !== "requested" ? signal.wallet : "Очікує введення адміністратором";
    return `<b>Персональний гаманець:</b> ${escapeHtml(wallet)}`;
  }
  if (signal.type !== "profile_update" && signal.type !== "email_update") return escapeHtml(signal.wallet);
  try {
    const changes = JSON.parse(signal.wallet || "{}");
    const names = {fullname:"Повне ім'я",nickname:"Нікнейм",country:"Країна",phone:"Телефон",email:"Нова пошта"};
    return Object.entries(changes).map(([key,value]) => `<b>${names[key] || escapeHtml(key)}:</b> ${escapeHtml(value)}`).join("<br>");
  } catch { return "Некоректні дані заявки"; }
}

function renderSignalList(signals, emptyText) {
  const filtered = signals.filter(signal => matchesSearch(searchable([
    signal.id, signal.user_id, signal.user?.display_id, signal.user?.fullname, signal.user?.nickname,
    signal.user?.email, signal.type, signalNames[signal.type], signal.amount, signal.wallet, signal.status, signal.created_at
  ])));
  return filtered.length ? filtered.map(signal => `
    <article class="card">
      <b>${escapeHtml(signalNames[signal.type] || signal.type)}</b>
      <div class="grid">
        <div><span class="label">Користувач</span><br>#${signal.user?.display_id || displayId(signal.user_id)} ${escapeHtml(signal.user?.nickname || signal.user?.fullname)}</div>
        <div><span class="label">Email</span><br>${escapeHtml(signal.user?.email)}</div>
        <div><span class="label">Сума</span><br>$${money(signal.amount)}</div>
        <div><span class="label">Деталі</span><br>${signalDetails(signal)}</div>
        <div><span class="label">Статус</span><br><span class="${escapeHtml(signal.status)}">${escapeHtml(signal.status)}</span></div>
        <div><span class="label">Час</span><br>${new Date(signal.created_at).toLocaleString("uk-UA")}</div>
      </div>
      <div class="signal-actions">
        ${signal.type === "wallet_create" && signal.status === "pending" ? `<input class="wallet-input" id="wallet-${signal.id}" value="${escapeHtml(signal.wallet && signal.wallet !== "requested" ? signal.wallet : "")}" placeholder="Впишіть персональний гаманець"><button class="approve" onclick="approveWalletRequest(${signal.id})">Зберегти гаманець</button><button class="reject" onclick="setSignal(${signal.id}, 'reject')">Відхилити</button>` : ""}
        ${signal.type !== "wallet_create" && signal.status === "pending" ? `<button class="approve" onclick="setSignal(${signal.id}, 'approve')">Підтвердити</button><button class="reject" onclick="setSignal(${signal.id}, 'reject')">Відхилити</button>` : ""}
        <button class="delete-btn" onclick="deleteSignal(${signal.id})">Видалити заявку</button>
      </div>
    </article>
  `).join("") : `<div class="empty">${emptyText}</div>`;
}

async function loadSignals() {
  allSignals = await adminFetch("/admin/signals").then(response => response.json());
  renderSignals(allSignals);
}

function renderDepositAddressStatus(status) {
  if (!status) return "";
  if (!status.success) {
    return `<article class="card"><b>Файл депозитних адрес</b><div class="empty">${escapeHtml(status.message || "Файл не читається")}</div></article>`;
  }
  return `
    <article class="card">
      <b>Файл депозитних адрес</b>
      <div class="grid">
        <div><span class="label">Шлях</span><br>${escapeHtml(status.file_path)}</div>
        <div><span class="label">Усього адрес</span><br>${Number(status.total || 0)}</div>
        <div><span class="label">Вільні</span><br>${Number(status.free || 0)}</div>
        <div><span class="label">Прив'язані</span><br>${Number(status.assigned || 0)}</div>
        <div><span class="label">Некоректні</span><br>${Number(status.invalid || 0)}</div>
        <div><span class="label">Статус</span><br>${status.created ? "Файл створено автоматично" : "Файл підключено"}</div>
      </div>
      <div class="file-upload">
        <input id="depositAddressFile" type="file" accept=".json,.txt,.csv">
        <button type="button" onclick="importDepositAddressFile()">Завантажити з ноутбука на сервер</button>
      </div>
      <div class="muted-note">Підходить JSON як у прикладі або простий список: одна адреса в рядку.</div>
    </article>
  `;
}

async function loadDepositAddressStatus() {
  depositAddressStatus = await adminFetch("/admin/deposit-addresses/status").then(response => response.json());
}

async function importDepositAddressFile() {
  const input = document.getElementById("depositAddressFile");
  const file = input?.files?.[0];
  if (!file) return alert("Виберіть файл з адресами на ноутбуці");
  const content = await file.text();
  const response = await adminFetch("/admin/deposit-addresses/import", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({filename:file.name, content})
  });
  const result = await response.json().catch(() => ({}));
  if (!result.success) return alert(result.message || "Не вдалося завантажити файл на сервер");
  depositAddressStatus = result;
  renderSignals(allSignals);
  alert(`Файл завантажено на сервер. Адрес: ${result.imported || result.total || 0}`);
}

function renderSignals(signals) {
  document.getElementById("signals").innerHTML = renderSignalList(signals.filter(signal => !["deposit","withdraw","withdraw_wallet","wallet_create","profile_update","email_update","support_user","support_bot","support_admin"].includes(signal.type)), "Типових сигналів немає");
  document.getElementById("walletRequests").innerHTML = renderDepositAddressStatus(depositAddressStatus) + renderSignalList(signals.filter(signal => signal.type === "wallet_create"), "Запитів на створення гаманця немає");
  document.getElementById("deposits").innerHTML = renderSignalList(signals.filter(signal => signal.type === "deposit"), "Заявок на поповнення немає");
  document.getElementById("withdrawals").innerHTML = renderSignalList(signals.filter(signal => signal.type === "withdraw"), "Заявок на виведення немає");
  document.getElementById("profileRequests").innerHTML = renderSignalList(signals.filter(signal => ["profile_update","email_update"].includes(signal.type)), "Заявок на зміну даних немає");
  window.appTranslate?.translatePage();
}

async function loadSupport() {
  const response = await adminFetch("/admin/support");
  const data = await response.json();
  allSupport = data.messages || [];
  renderSupport(allSupport);
}

function renderSupport(messages) {
  const grouped = {};
  for (const item of messages) {
    (grouped[item.user_id] ||= { user: item.user, messages: [] }).messages.push(item);
  }
  const threads = Object.entries(grouped).map(([userId, thread]) => ({
    userId,
    user: thread.user,
    messages: thread.messages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at)),
    latest: Math.max(...thread.messages.map(item => new Date(item.created_at).getTime()))
  })).sort((a, b) => b.latest - a.latest).filter(thread => matchesSearch(searchable([
    thread.userId, thread.user?.display_id, thread.user?.fullname, thread.user?.nickname, thread.user?.email,
    ...thread.messages.map(item => `${item.role} ${item.text} ${item.status}`)
  ])));

  document.getElementById("support").innerHTML = threads.length ? threads.map(thread => `
    <article class="card">
      <b>#${thread.user?.display_id || displayId(thread.userId)} ${escapeHtml(thread.user?.nickname || thread.user?.fullname || "Користувач")}</b>
      <div class="label">${escapeHtml(thread.user?.email || "-")}</div>
      <div class="support-thread">
        ${thread.messages.map(item => `
          <div class="support-line ${escapeHtml(item.role || "bot")}">
            <b>${item.role === "user" ? "Користувач" : item.role === "support" ? "Підтримка" : "AI оператор"}</b><br>
            ${escapeHtml(item.text)}
            <small>${escapeHtml(item.status)} · ${new Date(item.created_at).toLocaleString("uk-UA")}</small>
          </div>
        `).join("")}
      </div>
      <div class="support-reply">
        <textarea id="support-reply-${thread.userId}" placeholder="Відповідь від імені підтримки"></textarea>
        <button type="button" onclick="sendSupportReply(${thread.userId})">Надіслати відповідь</button>
      </div>
    </article>
  `).join("") : '<div class="empty">Звернень у підтримку немає</div>';
  window.appTranslate?.translatePage();
}

async function sendSupportReply(userId) {
  const input = document.getElementById(`support-reply-${userId}`);
  const message = input.value.trim();
  if (!message) return alert("Введіть відповідь");
  const response = await adminFetch("/admin/support/reply", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user_id:userId, message})
  });
  const result = await response.json().catch(() => ({}));
  if (!result.success) return alert(result.message || "Не вдалося надіслати відповідь");
  input.value = "";
  await loadSupport();
}

async function approveWalletRequest(id) {
  const input = document.getElementById(`wallet-${id}`);
  const wallet = input?.value.trim();
  if (!wallet) return alert("Впишіть гаманець");
  const response = await adminFetch("/admin/set-wallet", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id, wallet})
  });
  const result = await response.json().catch(() => ({}));
  if (!result.success) return alert(result.message || "Не вдалося зберегти гаманець");
  await refresh();
}

async function setSignal(id, action) {
  const response = await adminFetch(`/admin/${action}`, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id})});
  const result = await response.json().catch(() => ({}));
  if (!result.success) return alert(result.message || "Дію не виконано");
  await refresh();
}

async function deleteSignal(id) {
  if (!confirm("Видалити цю заявку/запис з адмін-панелі?")) return;
  const response = await adminFetch("/admin/delete-signal", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id})});
  const result = await response.json().catch(() => ({}));
  if (!result.success) return alert(result.message || "Не вдалося видалити заявку");
  await refresh();
}

function treeNode(user, childrenByReferrer) {
  const children = childrenByReferrer[user.id] || [];
  return `<div class="card"><b>#${user.display_id || displayId(user.id)} ${escapeHtml(user.nickname || user.fullname)}</b> · $${money(user.balance)} · ${escapeHtml(user.email)}
    ${children.length ? `<div class="tree">${children.map(child => treeNode(child, childrenByReferrer)).join("")}</div>` : ""}
  </div>`;
}

async function loadSatellites() {
  allReferrals = await adminFetch("/admin/referrals").then(response => response.json());
  renderSatellites(allReferrals);
}

function renderSatellites(users) {
  if (searchText()) {
    const filtered = users.filter(user => matchesSearch(searchable([
      user.id, user.display_id, user.fullname, user.nickname, user.email, user.balance, user.referrer_id
    ])));
    document.getElementById("satellites").innerHTML = filtered.length ? filtered.map(user => `
      <div class="card"><b>#${user.display_id || displayId(user.id)} ${escapeHtml(user.nickname || user.fullname)}</b> · $${money(user.balance)} · ${escapeHtml(user.email)}
        <div class="label">Запрошений користувачем: ${displayId(user.referrer_id)}</div>
      </div>
    `).join("") : '<div class="empty">За пошуком нічого не знайдено</div>';
    window.appTranslate?.translatePage();
    return;
  }
  const children = {};
  users.forEach(user => {
    if (user.referrer_id) (children[user.referrer_id] ||= []).push(user);
  });
  const roots = users.filter(user => !user.referrer_id || !users.some(parent => parent.id === user.referrer_id));
  document.getElementById("satellites").innerHTML = roots.length ? roots.map(root => treeNode(root, children)).join("") : '<div class="empty">Структура порожня</div>';
  window.appTranslate?.translatePage();
}

async function refresh() {
  try {
    await Promise.all([loadUsers(), loadDepositAddressStatus(), loadSatellites(), loadSupport()]);
    await loadSignals();
  }
  catch (error) {
    const message = error.message === "admin-auth" ? "Невірний код адміністратора або ADMIN_KEY не налаштований на Render." : "Не вдалося завантажити дані";
    document.querySelectorAll(".section").forEach(section => section.innerHTML = `<div class="empty">${message}</div>`);
    window.appTranslate?.translatePage();
  }
}
if (adminKey) {
  document.getElementById("adminKeyInput").value = adminKey;
  loginAdmin();
}
setInterval(() => { if (adminKey) refresh(); }, 15000);
</script>
<script src="app-nav.js"></script>
</body>
</html>
