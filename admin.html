<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  padding:20px;
}

.user {
  background:#111;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.section {
  margin-bottom:30px;
}

input {
  padding:5px;
  margin-top:5px;
  width:100px;
}

button {
  margin:5px;
  padding:5px 10px;
  cursor:pointer;
}

.title {
  font-size:20px;
  margin-bottom:10px;
  color:orange;
}
</style>

</head>

<body>

<h2>👑 Admin Panel</h2>

<div class="section">
<div class="title">👥 Користувачі</div>
<div id="users"></div>
</div>

<div class="section">
<div class="title">📩 Сигнали (активність)</div>
<div id="signals"></div>
</div>

<script>

async function loadUsers(){

  let res = await fetch("/admin/users");
  let users = await res.json();

  let html = "";

  users.forEach(u => {

    html += `
    <div class="user">
      <b>ID:</b> ${u.id}<br>
      <b>Email:</b> ${u.email}<br>
      <b>Name:</b> ${u.fullname}<br>
      <b>Nick:</b> ${u.nickname}<br>
      <b>Country:</b> ${u.country}<br>
      <b>Phone:</b> ${u.phone}<br>
      <b>Wallet:</b> ${u.wallet_address}<br>

      <b>Balance:</b> $${Number(u.balance).toFixed(2)}<br>
      <b>Deposit:</b> $${Number(u.deposit).toFixed(2)}<br>

      🔥 <b>Satellites:</b> ${u.satellites || 0}<br>

      <input id="input_${u.id}" placeholder="Сума">

      <br>

      <button onclick="add(${u.id},100)">+100</button>
      <button onclick="add(${u.id},-100)">-100</button>

      <button onclick="custom(${u.id})">ДОДАТИ</button>
      <button onclick="setBalance(${u.id})">SET</button>
    </div>
    `;

  });

  document.getElementById("users").innerHTML = html;
}

// ===== СИГНАЛИ =====
// 🔥 простий варіант: показуємо активних (депозит/баланс змінювався)

async function loadSignals(){

  let res = await fetch("/admin/users");
  let users = await res.json();

  let html = "";

  users.forEach(u => {

    if(u.deposit > 0){
      html += `
      <div class="user">
        💰 <b>DEPOSIT</b><br>
        ID: ${u.id}<br>
        Email: ${u.email}<br>
        Сума: $${Number(u.deposit).toFixed(2)}
      </div>
      `;
    }

    if(u.balance < u.deposit){
      html += `
      <div class="user">
        📤 <b>WITHDRAW</b><br>
        ID: ${u.id}<br>
        Email: ${u.email}<br>
        Баланс: $${Number(u.balance).toFixed(2)}
      </div>
      `;
    }

  });

  document.getElementById("signals").innerHTML = html;
}

// ===== ДІЇ =====
async function add(id, amount){

  await fetch("/admin/add-balance", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user_id: id,
      amount
    })
  });

  loadUsers();
}

async function custom(id){

  let amount = document.getElementById("input_" + id).value;

  await fetch("/admin/add-balance", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user_id: id,
      amount: Number(amount)
    })
  });

  loadUsers();
}

async function setBalance(id){

  let amount = document.getElementById("input_" + id).value;

  await fetch("/admin/set-balance", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user_id: id,
      amount: Number(amount)
    })
  });

  loadUsers();
}

// ===== INIT =====
loadUsers();
loadSignals();

// 🔥 автооновлення
setInterval(()=>{
  loadUsers();
  loadSignals();
},5000);

</script>

</body>
</html>
