<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Адмінпанель</title>
<link rel="stylesheet" href="app.css">
<style>
body { margin:0; padding:20px; font-family:Arial,sans-serif; }
.admin-wrap { max-width:1100px; margin:auto; }
h1 { text-align:center; }
.tabs { display:flex; flex-wrap:wrap; gap:8px; margin:20px 0; }
.tabs button { width:auto; padding:10px 14px; border:0; border-radius:8px; background:#273248; color:white; cursor:pointer; }
.tabs button.active { background:var(--accent); color:#111; }
.section { display:none; }
.section.active { display:block; }
.card { margin:10px 0; padding:16px; border:1px solid #273248; border-radius:12px; background:var(--panel); }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:8px; }
.label { color:var(--muted); font-size:12px; }
.controls { display:flex; gap:8px; margin-top:12px; }
.controls input { width:140px; padding:9px; border:1px solid #334155; border-radius:7px; background:#0b1220; color:white; }
.controls button,.signal-actions button { width:auto; padding:9px 12px; border:0; border-radius:7px; cursor:pointer; }
.approve { background:var(--success); color:#04130a; }
.reject { background:var(--danger); color:white; }
.pending { color:var(--accent); }
.approved,.done,.rewarded { color:var(--success); }
.rejected { color:var(--danger); }
.tree { margin-left:20px; padding-left:14px; border-left:2px solid #334155; }
.empty { padding:18px; color:var(--muted); text-align:center; }
.access { max-width:420px; margin:20px auto; text-align:center; }
.access input { width:100%; padding:11px; margin:10px 0; border:1px solid #334155; border-radius:8px; background:#0b1220; color:white; }
.access button { padding:10px 18px; border:0; border-radius:8px; background:var(--accent); color:#111; cursor:pointer; }
</style>
</head>
<body data-no-nav="true">
<main class="admin-wrap">
  <h1>Адмінпанель</h1>
  <section class="card access" id="adminAccess">
    <h2>Вхід адміністратора</h2>
    <input id="adminKeyInput" type="password" autocomplete="current-password" placeholder="Код доступу">
    <button type="button" onclick="loginAdmin()">Увійти</button>
    <div class="empty" id="accessMessage"></div>
  </section>
  <div id="adminContent" hidden>
    <div class="tabs">
      <button class="active" data-tab="users">Користувачі</button>
      <button data-tab="signals">Типові сигнали</button>
      <button data-tab="deposits">Поповнення</button>
      <button data-tab="withdrawals">Виведення</button>
      <button data-tab="satellites">Структура сателітів</button>
    </div>
    <section class="section active" id="users"></section>
    <section class="section" id="signals"></section>
    <section class="section" id="deposits"></section>
    <section class="section" id="withdrawals"></section>
    <section class="section" id="satellites"></section>
  </div>
</main>
<script>
const API_URL = ["localhost", "127.0.0.1"].includes(location.hostname) ? location.origin : "https://cryptoapp-eqc5.onrender.com";
let adminKey = sessionStorage.getItem("admin_key") || "";
const adminFetch = (path, options = {}) => fetch(API_URL + path, {
  ...options,
  headers: { ...(options.headers || {}), "X-Admin-Key": adminKey }
});
const escapeHtml = value => String(value ?? "-").replace(/[&<>'"]/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[char]));
const money = value => Number(value || 0).toFixed(2);
const displayId = value => value ? String(value).padStart(8, "0") : "-";

async function loginAdmin() {
  adminKey = document.getElementById("adminKeyInput").value.trim();
  const response = await adminFetch("/admin/users");
  if (!response.ok) {
    document.getElementById("accessMessage").textContent = "Невірний код або ADMIN_KEY не налаштований на Render.";
    return;
  }
  sessionStorage.setItem("admin_key", adminKey);
  document.getElementById("adminAccess").hidden = true;
  document.getElementById("adminContent").hidden = false;
  await refresh();
}

document.querySelectorAll("[data-tab]").forEach(button => button.addEventListener("click", () => {
  document.querySelectorAll("[data-tab], .section").forEach(element => element.classList.remove("active"));
  button.classList.add("active");
  document.getElementById(button.dataset.tab).classList.add("active");
}));

async function loadUsers() {
  const response = await adminFetch("/admin/users");
  if (response.status === 401 || response.status === 503) throw new Error("admin-auth");
  const users = await response.json();
  document.getElementById("users").innerHTML = users.length ? users.map(user => `
    <article class="card">
      <div class="grid">
        <div><span class="label">ID</span><br>${user.display_id || displayId(user.id)}</div>
        <div><span class="label">Ім'я</span><br>${escapeHtml(user.fullname)}</div>
        <div><span class="label">Нікнейм</span><br>${escapeHtml(user.nickname)}</div>
        <div><span class="label">Email</span><br>${escapeHtml(user.email)}</div>
        <div><span class="label">Телефон</span><br>${escapeHtml(user.phone)}</div>
        <div><span class="label">Країна</span><br>${escapeHtml(user.country)}</div>
        <div><span class="label">Баланс</span><br>$${money(user.balance)}</div>
        <div><span class="label">Запрошений користувачем</span><br>${displayId(user.referrer_id)}</div>
        <div><span class="label">Сателіти</span><br>${user.satellites || 0}</div>
      </div>
      <div class="controls">
        <input id="balance-${user.id}" type="number" step="0.01" placeholder="Сума">
        <button class="approve" onclick="changeBalance(${user.id}, 'add')">Додати</button>
        <button onclick="changeBalance(${user.id}, 'set')">Встановити</button>
      </div>
    </article>
  `).join("") : '<div class="empty">Користувачів немає</div>';
}

async function changeBalance(userId, mode) {
  const amount = Number(document.getElementById(`balance-${userId}`).value);
  if (!Number.isFinite(amount)) return alert("Введіть суму");
  await adminFetch(`/admin/${mode === "add" ? "add-balance" : "set-balance"}`, {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({user_id:userId, amount})
  });
  await loadUsers();
}

const signalNames = {
  register:"Реєстрація", deposit:"Поповнення", withdraw:"Виведення",
  quiz_1:"Тест 1", quiz_2:"Тест 2", quiz_3:"Тест 3", quiz_4:"Тест 4", quiz_5:"Тест 5",
  trade_main:"Основна торгівля", trade_satellite_1:"Сателіт 1", trade_satellite_2:"Сателіт 2",
  trade_satellite_3:"Сателіт 3", trade_satellite_4:"Сателіт 4", trade_satellite_5:"Сателіт 5",
  profile_update:"Зміна даних користувача", email_update:"Зміна електронної пошти"
};

function signalDetails(signal) {
  if (signal.type !== "profile_update" && signal.type !== "email_update") return escapeHtml(signal.wallet);
  try {
    const changes = JSON.parse(signal.wallet || "{}");
    const names = {fullname:"Повне ім'я",nickname:"Нікнейм",country:"Країна",phone:"Телефон",email:"Нова пошта"};
    return Object.entries(changes).map(([key,value]) => `<b>${names[key] || escapeHtml(key)}:</b> ${escapeHtml(value)}`).join("<br>");
  } catch { return "Некоректні дані заявки"; }
}

function renderSignalList(signals, emptyText) {
  return signals.length ? signals.map(signal => `
    <article class="card">
      <b>${escapeHtml(signalNames[signal.type] || signal.type)}</b>
      <div class="grid">
        <div><span class="label">Користувач</span><br>#${signal.user?.display_id || displayId(signal.user_id)} ${escapeHtml(signal.user?.nickname || signal.user?.fullname)}</div>
        <div><span class="label">Email</span><br>${escapeHtml(signal.user?.email)}</div>
        <div><span class="label">Сума</span><br>$${money(signal.amount)}</div>
        <div><span class="label">Деталі</span><br>${signalDetails(signal)}</div>
        <div><span class="label">Статус</span><br><span class="${escapeHtml(signal.status)}">${escapeHtml(signal.status)}</span></div>
        <div><span class="label">Час</span><br>${new Date(signal.created_at).toLocaleString("uk-UA")}</div>
      </div>
      ${signal.status === "pending" ? `<div class="signal-actions"><button class="approve" onclick="setSignal(${signal.id}, 'approve')">Підтвердити</button><button class="reject" onclick="setSignal(${signal.id}, 'reject')">Відхилити</button></div>` : ""}
    </article>
  `).join("") : `<div class="empty">${emptyText}</div>`;
}

async function loadSignals() {
  const signals = await adminFetch("/admin/signals").then(response => response.json());
  document.getElementById("signals").innerHTML = renderSignalList(signals.filter(signal => !["deposit","withdraw"].includes(signal.type)), "Типових сигналів немає");
  document.getElementById("deposits").innerHTML = renderSignalList(signals.filter(signal => signal.type === "deposit"), "Заявок на поповнення немає");
  document.getElementById("withdrawals").innerHTML = renderSignalList(signals.filter(signal => signal.type === "withdraw"), "Заявок на виведення немає");
}

async function setSignal(id, action) {
  await adminFetch(`/admin/${action}`, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id})});
  await loadSignals();
}

function treeNode(user, childrenByReferrer) {
  const children = childrenByReferrer[user.id] || [];
  return `<div class="card"><b>#${user.display_id || displayId(user.id)} ${escapeHtml(user.nickname || user.fullname)}</b> · $${money(user.balance)} · ${escapeHtml(user.email)}
    ${children.length ? `<div class="tree">${children.map(child => treeNode(child, childrenByReferrer)).join("")}</div>` : ""}
  </div>`;
}

async function loadSatellites() {
  const users = await adminFetch("/admin/referrals").then(response => response.json());
  const children = {};
  users.forEach(user => {
    if (user.referrer_id) (children[user.referrer_id] ||= []).push(user);
  });
  const roots = users.filter(user => !user.referrer_id || !users.some(parent => parent.id === user.referrer_id));
  document.getElementById("satellites").innerHTML = roots.length ? roots.map(root => treeNode(root, children)).join("") : '<div class="empty">Структура порожня</div>';
}

async function refresh() {
  try { await Promise.all([loadUsers(), loadSignals(), loadSatellites()]); }
  catch (error) {
    const message = error.message === "admin-auth" ? "Невірний код адміністратора або ADMIN_KEY не налаштований на Render." : "Не вдалося завантажити дані";
    document.querySelectorAll(".section").forEach(section => section.innerHTML = `<div class="empty">${message}</div>`);
  }
}
if (adminKey) {
  document.getElementById("adminKeyInput").value = adminKey;
  loginAdmin();
}
setInterval(() => { if (adminKey) refresh(); }, 15000);
</script>
<script src="app-nav.js"></script>
</body>
</html>
