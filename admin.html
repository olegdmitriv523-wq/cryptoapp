<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  padding:20px;
}

.user {
  background:#111;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.section {
  margin-bottom:30px;
}

input {
  padding:5px;
  margin-top:5px;
  width:100px;
}

button {
  margin:5px;
  padding:5px 10px;
  cursor:pointer;
}

.title {
  font-size:20px;
  margin-bottom:10px;
  color:orange;
}
</style>

</head>

<body>

<h2>👑 Admin Panel</h2>

<div class="section">
<div class="title">👥 Користувачі</div>
<div id="users"></div>
</div>

<div class="section">
<div class="title">📩 Сигнали (транзакції)</div>
<div id="signals"></div>
</div>

<script>

// ===== USERS =====
async function loadUsers(){

  let res = await fetch("/admin/users");
  let users = await res.json();

  let html = "";

  users.forEach(u => {

    html += `
    <div class="user">
      <b>ID:</b> ${u.id}<br>
      <b>Email:</b> ${u.email}<br>
      <b>Name:</b> ${u.fullname}<br>
      <b>Nick:</b> ${u.nickname}<br>
      <b>Country:</b> ${u.country}<br>
      <b>Phone:</b> ${u.phone}<br>
      <b>Wallet:</b> ${u.wallet_address}<br>

      <b>Balance:</b> $${Number(u.balance).toFixed(2)}<br>
      <b>Deposit:</b> $${Number(u.deposit).toFixed(2)}<br>

      🔥 <b>Satellites:</b> ${u.satellites || 0}<br>

      <input id="input_${u.id}" placeholder="Сума">

      <br>

      <button onclick="add(${u.id},100)">+100</button>
      <button onclick="add(${u.id},-100)">-100</button>

      <button onclick="custom(${u.id})">ДОДАТИ</button>
      <button onclick="setBalance(${u.id})">SET</button>
    </div>
    `;

  });

  document.getElementById("users").innerHTML = html;
}

// ===== SIGNALS (TRANSACTIONS) =====
async function loadSignals(){

  let res = await fetch("/admin/transactions");
  let txs = await res.json();

  let html = "";

  txs.forEach(t => {

    html += `
    <div class="user">

      ${t.type === "deposit" ? "💰 DEPOSIT" : "📤 WITHDRAW"}<br>

      User ID: ${t.user_id}<br>
      Amount: $${Number(t.amount).toFixed(2)}<br>

      ${t.wallet ? "Wallet: " + t.wallet + "<br>" : ""}

      Status: ${t.status}<br>
      Time: ${new Date(t.created_at).toLocaleString()}<br>

      ${t.status === "pending" ? `
        <button onclick="approve(${t.id})">✅ Approve</button>
        <button onclick="reject(${t.id})">❌ Reject</button>
      ` : ""}

    </div>
    `;

  });

  document.getElementById("signals").innerHTML = html;
}

// ===== ACTIONS =====
async function add(id, amount){
  await fetch("/admin/add-balance", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ user_id: id, amount })
  });
  loadUsers();
}

async function custom(id){
  let amount = document.getElementById("input_" + id).value;

  await fetch("/admin/add-balance", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user_id: id,
      amount: Number(amount)
    })
  });

  loadUsers();
}

async function setBalance(id){
  let amount = document.getElementById("input_" + id).value;

  await fetch("/admin/set-balance", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user_id: id,
      amount: Number(amount)
    })
  });

  loadUsers();
}

// ===== APPROVE =====
async function approve(id){

  await fetch("/admin/approve", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ id })
  });

  loadSignals();
}

// ===== REJECT =====
async function reject(id){

  await fetch("/admin/reject", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ id })
  });

  loadSignals();
  loadUsers();
}

// ===== INIT =====
loadUsers();
loadSignals();

setInterval(()=>{
  loadUsers();
  loadSignals();
},5000);

</script>

</body>
</html>
