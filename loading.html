<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b0f1a">
<title>United Europe Crypto</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<style>
* { box-sizing:border-box; }
body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0b0f1a; color:white; font-family:Arial,sans-serif; }
.loader { width:min(360px,calc(100% - 40px)); padding:30px; border:1px solid #293246; border-radius:18px; background:#111827; text-align:center; }
.loader img { width:150px; height:150px; object-fit:contain; }
.bar { height:9px; margin:22px 0 12px; overflow:hidden; border-radius:20px; background:#263247; }
.bar span { display:block; width:45%; height:100%; border-radius:inherit; background:#f59e0b; animation:loading 1.2s ease-in-out infinite alternate; }
.status { color:#9ca3af; }
@keyframes loading { from { transform:translateX(-80%); } to { transform:translateX(200%); } }
</style>
</head>
<body>
<main class="loader">
  <img src="logo.png" alt="United Europe Crypto">
  <h1>United Europe Crypto</h1>
  <div class="bar" aria-label="Завантаження"><span></span></div>
  <div class="status" id="status">Завантаження United Europe Crypto...</div>
</main>
<script>
const destination = localStorage.getItem("token") ? "index.html" : "login.html";
async function waitForServer() {
  try {
    const response = await fetch("/health", {cache:"no-store"});
    if (response.ok) return location.replace(destination);
  } catch {}
  document.getElementById("status").textContent = "United Europe Crypto запускається. Зачекайте...";
  setTimeout(waitForServer, 2500);
}
waitForServer();
</script>
<script src="pwa.js"></script>
</body>
</html>
