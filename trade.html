<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Торгівля</title>
<link rel="stylesheet" href="app.css">
<script src="language-boot.js"></script>
<style>
body { margin:0; font-family:Arial,sans-serif; }
.trade-page { width:min(850px,calc(100% - 28px)); margin:auto; }
.balance { text-align:center; font-size:24px; margin:10px; }
.trade-card { display:grid; grid-template-columns:1fr auto; gap:14px; align-items:center; margin:12px 0; padding:18px; border:1px solid #293246; border-radius:13px; background:var(--panel); }
.trade-card.locked { opacity:.62; }
.details { color:var(--muted); font-size:14px; line-height:1.45; }
.trade-card button { width:130px; padding:10px; border:0; border-radius:8px; background:var(--success); color:#04130a; font-weight:bold; cursor:pointer; }
.trade-card button:disabled { background:#334155; color:#94a3b8; cursor:not-allowed; }
.notice { min-height:24px; text-align:center; color:var(--accent); }
@media(max-width:550px){.trade-card{grid-template-columns:1fr}.trade-card button{width:100%}}
</style>
</head>
<body>
<main class="trade-page">
  <h1>Торгівля</h1>
  <div class="balance">Ваш баланс: $<span id="balance">0.00</span></div>
  <p class="notice" id="notice"></p>
  <section id="positions"></section>
</main>
<script>
const API_URL = ["localhost", "127.0.0.1"].includes(location.hostname) ? location.origin : "https://cryptoapp-eqc5.onrender.com";
const token = localStorage.getItem("token");
if (!token) location.href = "login.html";
let statusData;

const money = value => Number(value || 0).toFixed(2);
function cooldownText(ms) {
  if (!ms) return "Доступно зараз";
  const hours = Math.floor(ms / 3600000);
  const minutes = Math.ceil((ms % 3600000) / 60000);
  return `Повторно через ${hours} год ${minutes} хв`;
}

function pendingText(ms) {
  if (!ms) return "";
  const minutes = Math.floor(ms / 60000);
  const seconds = Math.ceil((ms % 60000) / 1000);
  return `Угода завершується через ${minutes} хв ${seconds} с`;
}

function renderPosition(position, option, title) {
  const satellite = option.satellite;
  const subtitle = position === 0
    ? "Доступна всім користувачам"
    : satellite
      ? `Сателіт #${satellite.display_id || String(satellite.id).padStart(8, "0")}: ${satellite.nickname || "без нікнейма"} · реальний баланс $${money(satellite.balance)} · підтверджене поповнення $${money(satellite.deposit)}${satellite.active ? "" : ` · активується від $${option.minDeposit || 500}`}`
      : `Потрібен ${position}-й активний сателіт із підтвердженим поповненням від $${option.minDeposit || 500}`;
  const disabled = !option.unlocked || option.cooldown > 0 || option.pending > 0 || statusData.balance <= 0;
  const pending = pendingText(option.pending);
  return `<article class="trade-card${option.unlocked ? "" : " locked"}">
    <div><h2>${title}</h2><div class="details">${subtitle}<br>Винагорода: ${(option.rate * 100).toFixed(1)}% від вашого балансу<br>${pending || cooldownText(option.cooldown)}</div></div>
    <button ${disabled ? "disabled" : ""} onclick="executeTrade(${position})">${option.unlocked ? "Торгувати" : "Заблоковано"}</button>
  </article>`;
}

async function loadStatus() {
  const response = await fetch(API_URL + "/trade/status", {headers:{Authorization:token}});
  if (response.status === 401) return location.href = "login.html";
  statusData = await response.json();
  if (!statusData.success) return document.getElementById("notice").textContent = "Не вдалося завантажити торгівлю.";
  document.getElementById("balance").textContent = money(statusData.balance);
  document.getElementById("positions").innerHTML = [
    renderPosition(0, statusData.main, "Основна торгівля"),
    ...statusData.slots.map((slot, index) => renderPosition(index + 1, slot, `Позиція ${index + 1}`))
  ].join("");
}

async function executeTrade(position) {
  const response = await fetch(API_URL + "/trade/execute", {
    method:"POST", headers:{"Content-Type":"application/json",Authorization:token}, body:JSON.stringify({position})
  });
  const data = await response.json();
  document.getElementById("notice").textContent = data.success
    ? `Угода почалась. Очікуване нарахування $${money(data.reward)} буде доступне через 10 хвилин.`
    : ({"No balance":"Для торгівлі потрібен позитивний баланс.","Position locked":"Ця позиція ще заблокована.","Trade pending":"Попередня угода ще очікує завершення.","Cooldown active":"Позиція ще відновлюється."}[data.message] || "Не вдалося виконати угоду.");
  await loadStatus();
}
loadStatus();
setInterval(loadStatus, 30000);
</script>
<script src="app-nav.js"></script>
</body>
</html>
