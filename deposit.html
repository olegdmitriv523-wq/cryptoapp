<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Deposit</title>

<style>
body {
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
}

.container {
padding:20px;
}

input {
width:90%;
padding:12px;
margin:10px 0;
background:#111;
border:none;
color:white;
border-radius:8px;
}

.btn {
background:lime;
padding:12px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.crypto {
margin-top:20px;
}

.crypto img {
width:50px;
}

.wallet {
background:#111;
padding:10px;
border-radius:8px;
margin-top:10px;
word-break:break-all;
cursor:pointer;
}

.qr {
margin-top:20px;
}

.back {
margin-top:20px;
display:inline-block;
color:orange;
cursor:pointer;
}
</style>

</head>

<body>

<script>
const API_URL = "https://cryptoapp-eqc5.onrender.com";
let token = localStorage.getItem("token");

if(!token){
location.href = "login.html";
}
</script>

<div class="container">

<h2>Поповнення</h2>

<!-- 🔥 КРИПТА -->

<div class="crypto">
<img src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png">
<div>USDT (TRC20)</div>
</div>

<!-- 🔥 ГАМАНЕЦЬ -->

<div id="walletBox" class="wallet" onclick="copyWallet()">
Завантаження гаманця...
</div>

<!-- 🔥 QR -->

<div class="qr">
<img id="qr" width="180">
</div>

<!-- 🔥 ВВІД -->

<input id="amount" placeholder="Введи суму $" />

<div class="btn" onclick="deposit()">Я оплатив</div>

<div class="back" onclick="goBack()">← Назад</div>

</div>

<script>

// ===== LOAD USER =====
async function loadWallet(){

try{

let res = await fetch(API_URL + "/me", {
headers:{ Authorization: token }
});

let user = await res.json();

let wallet = user.wallet_address || "NO WALLET";

document.getElementById("walletBox").innerText = wallet;

// 🔥 QR генерація
document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + wallet;

}catch(e){
console.log("wallet error");
}

}

loadWallet();

// ===== COPY =====
function copyWallet(){

let text = document.getElementById("walletBox").innerText;

navigator.clipboard.writeText(text);

alert("Скопійовано");
}

// ===== DEPOSIT =====
async function deposit(){

let amount = parseFloat(document.getElementById("amount").value);

if(!amount || amount <= 0){
alert("Введи суму");
return;
}

try {

let res = await fetch(API_URL + "/deposit", {
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization: token
},
body:JSON.stringify({ amount })
});

let data = await res.json();

if(data.success){
alert("Депозит зараховано");
location.href="index.html";
}else{
alert("Помилка");
}

}catch(e){
alert("Сервер не відповідає");
}

}

// ===== BACK =====
function goBack(){
location.href="index.html";
}

</script>

</body>
</html>
