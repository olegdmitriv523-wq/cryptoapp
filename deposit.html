<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Поповнення</title>
<link rel="stylesheet" href="app.css">
<script src="language-boot.js"></script>
<style>
body {
  margin: 0;
  background: #0b0f1a;
  color: white;
  font-family: Arial, sans-serif;
}
.page {
  width: min(720px, calc(100% - 28px));
  margin: auto;
}
.top-actions {
  display: flex;
  justify-content: flex-end;
  margin: 8px 0 12px;
}
.back-btn {
  border: 0;
  border-radius: 12px;
  padding: 12px 16px;
  background: #1f2937;
  color: #f8fafc;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
}
.card {
  padding: 22px;
  border: 1px solid #293246;
  border-radius: 18px;
  background: linear-gradient(135deg, #111827, #18233a);
  text-align: center;
}
h1 {
  margin: 0 0 16px;
  font-size: 34px;
}
.crypto {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin: 8px 0 18px;
  font-size: 24px;
  font-weight: 800;
}
.crypto img {
  width: 58px;
  height: 58px;
  border-radius: 50%;
}
.wallet {
  margin-top: 12px;
  padding: 16px;
  border: 1px solid #334155;
  border-radius: 14px;
  background: #0b1220;
  font-size: 18px;
  line-height: 1.45;
  word-break: break-all;
  cursor: pointer;
}
.hint {
  margin: 12px 0;
  color: #cbd5e1;
  font-size: 16px;
  line-height: 1.5;
}
.qr img {
  width: 210px;
  height: 210px;
  margin: 18px auto;
  border-radius: 14px;
  background: white;
}
input {
  width: 100%;
  padding: 16px;
  margin: 10px 0;
  border: 1px solid #334155;
  border-radius: 14px;
  background: #0b1220;
  color: white;
  font-size: 20px;
}
.submit-btn {
  width: 100%;
  margin-top: 12px;
  padding: 16px;
  border: 0;
  border-radius: 15px;
  background: linear-gradient(135deg, #22c55e, #84cc16);
  color: #04130a;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
}
</style>
</head>
<body>
<script>
const API_URL = ["localhost", "127.0.0.1"].includes(location.hostname) ? location.origin : "https://cryptoapp-eqc5.onrender.com";
const token = localStorage.getItem("token");
if (!token) location.href = "login.html";
</script>

<main class="page">
  <div class="top-actions">
    <button class="back-btn" onclick="goBack()">← Назад</button>
  </div>

  <section class="card">
    <h1>Поповнення</h1>
    <div class="crypto">
      <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" alt="USDT">
      <span>USDT TRC20</span>
    </div>
    <p class="hint">Скопіюйте адресу гаманця або відскануйте QR-код. Мінімальна сума поповнення становить $500, а всього можна створити максимум дві активні або підтверджені заявки.</p>
    <div id="walletBox" class="wallet" onclick="copyWallet()">Завантаження гаманця...</div>
    <div class="qr"><img id="qr" alt="QR"></div>
    <input id="amount" type="number" min="500" step="0.01" placeholder="Введіть суму від $500" />
    <button class="submit-btn" onclick="deposit()">Я оплатив</button>
  </section>
</main>

<script>
async function loadWallet() {
  try {
    const response = await fetch(API_URL + "/me", { headers: { Authorization: token } });
    if (response.status === 401) throw new Error("auth");
    const user = await response.json();
    const wallet = user.wallet_address || "NO WALLET";
    document.getElementById("walletBox").textContent = wallet;
    document.getElementById("qr").src = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + encodeURIComponent(wallet);
    window.appTranslate?.translatePage();
  } catch {
    localStorage.removeItem("token");
    location.href = "login.html";
  }
}

function copyWallet() {
  const text = document.getElementById("walletBox").textContent;
  navigator.clipboard.writeText(text);
  alert("Скопійовано");
}

async function deposit() {
  const amount = Number(document.getElementById("amount").value);
  if (!Number.isFinite(amount) || amount < 500) return alert("Мінімальна сума поповнення $500");
  try {
    const response = await fetch(API_URL + "/deposit", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: token },
      body: JSON.stringify({ amount })
    });
    const data = await response.json();
    if (data.success) {
      alert("Заявку на поповнення передано адміністратору. Баланс зміниться після підтвердження.");
      location.href = "index.html";
    } else {
      alert(data.message || "Помилка поповнення");
    }
  } catch {
    alert("Сервер не відповідає");
  }
}

function goBack() {
  location.href = "index.html";
}

loadWallet();
</script>
<script src="app-nav.js"></script>
</body>
</html>
