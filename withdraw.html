<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Виведення коштів</title>
<link rel="stylesheet" href="app.css">
<style>
body {
  margin: 0;
  background: #0b0f1a;
  color: white;
  font-family: Arial, sans-serif;
}
.page {
  width: min(720px, calc(100% - 28px));
  margin: auto;
}
.top-actions {
  display: flex;
  justify-content: flex-end;
  margin: 8px 0 12px;
}
.back-btn {
  border: 0;
  border-radius: 12px;
  padding: 12px 16px;
  background: #1f2937;
  color: #f8fafc;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
}
.card {
  padding: 22px;
  border: 1px solid #293246;
  border-radius: 18px;
  background: linear-gradient(135deg, #111827, #18233a);
}
h1 {
  margin: 0 0 14px;
  font-size: 34px;
  text-align: center;
}
.hint {
  color: #cbd5e1;
  font-size: 18px;
  line-height: 1.55;
  text-align: center;
}
.balance-box {
  margin: 16px 0;
  padding: 16px;
  border-radius: 14px;
  background: #0b1220;
  border: 1px solid #334155;
  font-size: 22px;
  font-weight: 800;
  text-align: center;
}
input {
  display: block;
  width: 100%;
  margin: 12px 0;
  padding: 16px;
  border: 1px solid #334155;
  border-radius: 14px;
  background: #0b1220;
  color: white;
  font-size: 20px;
}
.submit-btn {
  width: 100%;
  margin-top: 12px;
  padding: 16px;
  border: 0;
  border-radius: 15px;
  background: linear-gradient(135deg, #ef4444, #f97316);
  color: white;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
}
.submit-btn.disabled {
  background: #475569;
  cursor: not-allowed;
}
.timer {
  min-height: 24px;
  margin-top: 12px;
  color: #f59e0b;
  text-align: center;
  font-size: 18px;
}
</style>
</head>
<body>
<script>
const API_URL = ["localhost", "127.0.0.1"].includes(location.hostname) ? location.origin : "https://cryptoapp-eqc5.onrender.com";
const token = localStorage.getItem("token");
if (!token) location.href = "login.html";
</script>

<main class="page">
  <div class="top-actions">
    <button class="back-btn" onclick="goBack()">← Назад</button>
  </div>

  <section class="card">
    <h1>Виведення коштів</h1>
    <p class="hint">Вкажіть суму та адресу гаманця. Заявка піде адміністратору, а баланс зміниться тільки після підтвердження.</p>
    <div class="balance-box">Доступний баланс: $<span id="balance">0.00</span></div>
    <input id="amount" type="number" min="1" step="0.01" placeholder="Сума ($)">
    <input id="wallet" placeholder="Адреса гаманця">
    <button id="btn" class="submit-btn" onclick="withdraw()">Вивести</button>
    <div id="timer" class="timer"></div>
  </section>
</main>

<script>
let currentBalance = 0;

async function loadUser() {
  try {
    const response = await fetch(API_URL + "/me", { headers: { Authorization: token } });
    if (response.status === 401) throw new Error("auth");
    const user = await response.json();
    currentBalance = Number(user.balance || 0);
    document.getElementById("balance").textContent = currentBalance.toFixed(2);
  } catch {
    localStorage.removeItem("token");
    location.href = "login.html";
  }
}

function checkTimer() {
  const last = Number(localStorage.getItem("withdraw_time") || 0);
  if (!last) return;
  const update = () => {
    const left = 3600000 - (Date.now() - last);
    if (left <= 0) {
      document.getElementById("btn").classList.remove("disabled");
      document.getElementById("timer").textContent = "";
      return;
    }
    document.getElementById("btn").classList.add("disabled");
    const min = Math.floor(left / 60000);
    const sec = Math.floor((left % 60000) / 1000);
    document.getElementById("timer").textContent = `Спробуйте через: ${min}м ${sec}с`;
    setTimeout(update, 1000);
  };
  update();
}

async function withdraw() {
  if (document.getElementById("btn").classList.contains("disabled")) return;
  const amount = Number(document.getElementById("amount").value);
  const wallet = document.getElementById("wallet").value.trim();
  if (!Number.isFinite(amount) || amount <= 0 || !wallet) return alert("Заповніть всі поля");
  if (amount > currentBalance) return alert("Недостатньо коштів");

  try {
    const response = await fetch(API_URL + "/withdraw", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: token },
      body: JSON.stringify({ amount, wallet })
    });
    const data = await response.json();
    if (data.success) {
      localStorage.setItem("withdraw_time", Date.now());
      alert("Заявку на виведення передано адміністратору. Баланс зміниться після підтвердження.");
      location.href = "index.html";
    } else {
      alert(data.message || "Помилка");
    }
  } catch {
    alert("Сервер не відповідає");
  }
}

function goBack() {
  location.href = "index.html";
}

loadUser();
checkTimer();
</script>
<script src="app-nav.js"></script>
</body>
</html>
