<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Виведення коштів</title>
<link rel="stylesheet" href="app.css">
<script src="language-boot.js"></script>
<style>
body {
  margin: 0;
  background: #0b0f1a;
  color: white;
  font-family: Arial, sans-serif;
}
.page {
  width: min(720px, calc(100% - 28px));
  margin: auto;
}
.top-actions {
  display: flex;
  justify-content: flex-end;
  margin: 8px 0 12px;
}
.back-btn {
  border: 0;
  border-radius: 12px;
  padding: 12px 16px;
  background: #1f2937;
  color: #f8fafc;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
}
.card {
  padding: 22px;
  border: 1px solid #293246;
  border-radius: 18px;
  background: linear-gradient(135deg, #111827, #18233a);
}
h1 {
  margin: 0 0 14px;
  font-size: 34px;
  text-align: center;
}
.hint {
  color: #cbd5e1;
  font-size: 18px;
  line-height: 1.55;
  text-align: center;
}
.balance-box {
  margin: 16px 0;
  padding: 16px;
  border-radius: 14px;
  background: #0b1220;
  border: 1px solid #334155;
  font-size: 22px;
  font-weight: 800;
  text-align: center;
}
input {
  display: block;
  width: 100%;
  margin: 12px 0;
  padding: 16px;
  border: 1px solid #334155;
  border-radius: 14px;
  background: #0b1220;
  color: white;
  font-size: 20px;
}
.submit-btn {
  width: 100%;
  margin-top: 12px;
  padding: 16px;
  border: 0;
  border-radius: 15px;
  background: linear-gradient(135deg, #ef4444, #f97316);
  color: white;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
}
.submit-btn.disabled {
  background: #475569;
  cursor: not-allowed;
}
.timer {
  min-height: 24px;
  margin-top: 12px;
  color: #f59e0b;
  text-align: center;
  font-size: 18px;
}
.save-wallet-btn {
  width: 100%;
  padding: 12px;
  border: 0;
  border-radius: 12px;
  background: #334155;
  color: white;
  font-weight: 800;
  cursor: pointer;
}
.wallet-message {
  min-height: 22px;
  margin-top: 8px;
  color: #fbbf24;
  text-align: center;
}
</style>
</head>
<body>
<script>
const API_URL = ["localhost", "127.0.0.1"].includes(location.hostname) ? location.origin : "https://cryptoapp-eqc5.onrender.com";
const token = localStorage.getItem("token");
if (!token) location.href = "login.html";
</script>

<main class="page">
  <div class="top-actions">
    <button class="back-btn" onclick="goBack()">← Назад</button>
  </div>

  <section class="card">
    <h1>Виведення коштів</h1>
    <p class="hint">Вкажіть суму та адресу будь-якого гаманця для виводу. Мінімальна сума виводу становить $100. Вивести можна один раз на годину і тільки зароблені кошти, тобто суму понад підтверджені поповнення та заявки, які очікують рішення адміністратора.</p>
    <div class="balance-box">Доступно для виведення: $<span id="balance">0.00</span></div>
    <input id="amount" type="number" min="100" step="0.01" placeholder="Сума від $100">
    <input id="wallet" placeholder="Адреса будь-якого гаманця для виводу">
    <button class="save-wallet-btn" type="button" onclick="saveWithdrawWallet()">Зберегти гаманець для виводу</button>
    <div id="walletMessage" class="wallet-message"></div>
    <button id="btn" class="submit-btn" onclick="withdraw()">Вивести</button>
    <div id="timer" class="timer"></div>
  </section>
</main>

<script>
let currentEarned = 0;

async function loadUser() {
  try {
    const [response, walletResponse] = await Promise.all([
      fetch(API_URL + "/assets/summary", { headers: { Authorization: token } }),
      fetch(API_URL + "/withdraw/config", { headers: { Authorization: token } })
    ]);
    if (response.status === 401) throw new Error("auth");
    const summary = await response.json();
    if (!summary.success) throw new Error("summary");
    const walletData = await walletResponse.json().catch(() => ({}));
    if (walletData.success && walletData.wallet) {
      document.getElementById("wallet").value = walletData.wallet;
      document.getElementById("walletMessage").textContent = "Збережений гаманець підставлено";
    }
    const pendingWithdraw = (summary.history || [])
      .filter(item => item.type === "withdraw" && item.status === "pending")
      .reduce((sum, item) => sum + Number(item.amount || 0), 0);
    currentEarned = Math.max(0, Number(summary.balance || 0) - Number(summary.deposit || 0) - pendingWithdraw);
    document.getElementById("balance").textContent = currentEarned.toFixed(2);
    window.appTranslate?.translatePage();
  } catch {
    localStorage.removeItem("token");
    location.href = "login.html";
  }
}

async function saveWithdrawWallet() {
  const wallet = document.getElementById("wallet").value.trim();
  const message = document.getElementById("walletMessage");
  if (!wallet) {
    message.textContent = "Вкажіть гаманець для збереження";
    return;
  }
  message.textContent = "Збереження...";
  const response = await fetch(API_URL + "/withdraw/wallet", {
    method: "POST",
    headers: { "Content-Type": "application/json", Authorization: token },
    body: JSON.stringify({ wallet })
  });
  const data = await response.json().catch(() => ({}));
  message.textContent = data.success ? "Гаманець збережено" : (data.message || "Не вдалося зберегти гаманець");
  window.appTranslate?.translatePage();
}

async function withdraw() {
  if (document.getElementById("btn").classList.contains("disabled")) return;
  const amount = Number(document.getElementById("amount").value);
  const wallet = document.getElementById("wallet").value.trim();
  if (!Number.isFinite(amount) || amount <= 0 || !wallet) return alert("Заповніть всі поля");
  if (amount < 100) return alert("Мінімальна сума виводу $100");
  if (amount > currentEarned) return alert("Можна вивести тільки зароблені кошти");

  try {
    const response = await fetch(API_URL + "/withdraw", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: token },
      body: JSON.stringify({ amount, wallet })
    });
    const data = await response.json();
    if (data.success) {
      alert("Заявку на виведення передано адміністратору. Баланс зміниться після підтвердження.");
      location.href = "index.html";
    } else {
      alert(data.message || "Помилка");
    }
  } catch {
    alert("Сервер не відповідає");
  }
}

function goBack() {
  location.href = "index.html";
}

loadUser();
</script>
<script src="app-nav.js"></script>
</body>
</html>
