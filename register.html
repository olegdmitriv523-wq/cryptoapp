<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Реєстрація</title>
<link rel="stylesheet" href="app.css">
<script src="language-boot.js"></script>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 24px;
  background: #0b0f1a;
  font-family: Arial, sans-serif;
  color: white;
}
.box {
  width: min(100%, 380px);
  padding: 30px;
  background: #111;
  border-radius: 15px;
  text-align: center;
}
input {
  width: 100%;
  padding: 11px;
  margin: 7px 0;
  border: 1px solid transparent;
  border-radius: 8px;
  outline: none;
  background: #222;
  color: white;
}
input:focus { border-color: orange; }
button {
  width: 100%;
  padding: 11px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  background: orange;
  cursor: pointer;
  font-weight: bold;
}
button:disabled { cursor: wait; opacity: .65; }
.message { min-height: 20px; margin-top: 12px; color: #ff6b6b; }
.switch { margin-top: 8px; color: #aaa; cursor: pointer; }
.hidden { display: none; }
.code-help { color:#aaa; font-size:13px; line-height:1.45; }
</style>
</head>
<body data-no-nav="true">
<form class="box" id="registerForm">
  <h2>Реєстрація</h2>
  <input id="fullname" autocomplete="name" placeholder="Повне ім'я" required>
  <input id="nickname" autocomplete="nickname" placeholder="Нікнейм" required>
  <input id="country" autocomplete="country-name" placeholder="Країна" required>
  <input id="phone" type="tel" autocomplete="tel" placeholder="Телефон" required>
  <input id="email" type="email" autocomplete="email" placeholder="Email" required>
  <input id="password" type="password" autocomplete="new-password" minlength="6" placeholder="Пароль (мінімум 6 символів)" required>
  <input id="referrer_id" inputmode="numeric" maxlength="8" placeholder="8-значний ID запрошувача (необов'язково)">
  <button id="submitButton" type="submit">Надіслати код на пошту</button>
  <div class="message" id="message" role="alert"></div>
  <div class="switch" onclick="location.href='login.html'">Вже є акаунт? Увійти</div>
</form>
<form class="box hidden" id="verifyForm">
  <h2>Підтвердження пошти</h2>
  <p class="code-help">Ми надіслали шестизначний код на <b id="codeEmail"></b>. Без правильного коду акаунт не буде створено.</p>
  <input id="emailCode" inputmode="numeric" autocomplete="one-time-code" maxlength="6" pattern="[0-9]{6}" placeholder="Код із листа" required>
  <button id="verifyButton" type="submit">Підтвердити та створити акаунт</button>
  <div class="message" id="verifyMessage" role="alert"></div>
  <div class="switch" onclick="restartRegistration()">Змінити дані або надіслати код ще раз</div>
</form>

<script>
const API_URL = ["localhost", "127.0.0.1"].includes(location.hostname)
  ? location.origin
  : "https://cryptoapp-eqc5.onrender.com";

if (localStorage.getItem("registration_terms_accepted") !== "yes") {
  location.replace("terms.html");
}

const messages = {
  "No data": "Заповніть усі обов'язкові поля.",
  "Invalid email": "Введіть правильну електронну адресу.",
  "Invalid referrer": "Користувача з таким ID не знайдено.",
  "Invalid phone": "Телефон має містити від 10 до 15 цифр.",
  "Weak password": "Пароль має містити щонайменше 6 символів.",
  "User exists": "Користувач із таким email уже існує.",
  "Too many accounts": "З цього пристрою створено забагато акаунтів.",
  "Insert error": "Не вдалося створити акаунт. Спробуйте ще раз.",
  "Email send error": "Не вдалося надіслати лист. Перевірте email і спробуйте ще раз.",
  "Invalid code": "Неправильний код підтвердження.",
  "Code expired": "Термін дії коду минув. Надішліть новий код.",
  "Server error": "Сталася помилка сервера. Спробуйте пізніше."
};
let pendingToken = "";
let emailVerificationRequired = true;

async function loadRegistrationMode() {
  try {
    const response = await fetch(API_URL + "/registration/settings", { cache: "no-store" });
    const data = await response.json();
    emailVerificationRequired = data.emailVerificationRequired !== false;
  } catch {
    emailVerificationRequired = true;
  }
  document.getElementById("submitButton").textContent = emailVerificationRequired ? "Надіслати код на пошту" : "Зареєструватися";
  window.appTranslate?.translatePage();
}
loadRegistrationMode();

document.getElementById("registerForm").addEventListener("submit", async (event) => {
  event.preventDefault();

  const button = document.getElementById("submitButton");
  const message = document.getElementById("message");
  const phone = document.getElementById("phone").value.trim();
  const phoneDigits = phone.replace(/\D/g, "");

  if (phoneDigits.length < 10 || phoneDigits.length > 15) {
    message.textContent = messages["Invalid phone"];
    window.appTranslate?.translatePage();
    return;
  }

  const payload = {
    fullname: document.getElementById("fullname").value.trim(),
    nickname: document.getElementById("nickname").value.trim(),
    country: document.getElementById("country").value.trim(),
    phone,
    email: document.getElementById("email").value.trim(),
    password: document.getElementById("password").value,
    referrer_id: document.getElementById("referrer_id").value.trim() || null
  };

  button.disabled = true;
  button.textContent = emailVerificationRequired ? "Надсилання коду..." : "Створення акаунта...";
  message.textContent = "";

  try {
    const response = await fetch(API_URL + "/register/start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await response.json();

    if (!response.ok || !data.success) {
      message.textContent = messages[data.message] || "Не вдалося зареєструватися.";
      window.appTranslate?.translatePage();
      return;
    }

    if (data.registered) {
      localStorage.removeItem("registration_terms_accepted");
      alert("Акаунт створено. Тепер увійдіть.");
      location.href = "login.html";
      return;
    }

    pendingToken = data.pendingToken;
    document.getElementById("codeEmail").textContent = data.email;
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("verifyForm").classList.remove("hidden");
    document.getElementById("emailCode").focus();
    window.appTranslate?.translatePage();
  } catch {
    message.textContent = "Сервер недоступний. Перевірте з'єднання та спробуйте ще раз.";
    window.appTranslate?.translatePage();
  } finally {
    button.disabled = false;
    button.textContent = emailVerificationRequired ? "Надіслати код на пошту" : "Зареєструватися";
  }
});

document.getElementById("verifyForm").addEventListener("submit", async event => {
  event.preventDefault();
  const button = document.getElementById("verifyButton");
  const message = document.getElementById("verifyMessage");
  const code = document.getElementById("emailCode").value.trim();
  if (!/^\d{6}$/.test(code)) { message.textContent = "Введіть усі 6 цифр коду."; window.appTranslate?.translatePage(); return; }
  button.disabled = true;
  button.textContent = "Перевірка...";
  message.textContent = "";
  try {
    const response = await fetch(API_URL + "/register/verify", {
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({pendingToken, code})
    });
    const data = await response.json();
    if (!response.ok || !data.success) { message.textContent = messages[data.message] || "Не вдалося підтвердити код."; window.appTranslate?.translatePage(); return; }
    localStorage.removeItem("registration_terms_accepted");
    alert("Пошту підтверджено, акаунт створено. Тепер увійдіть.");
    location.href = "login.html";
  } catch {
    message.textContent = "Сервер недоступний. Спробуйте ще раз.";
    window.appTranslate?.translatePage();
  } finally {
    button.disabled = false;
    button.textContent = "Підтвердити та створити акаунт";
  }
});

function restartRegistration() {
  pendingToken = "";
  document.getElementById("verifyForm").classList.add("hidden");
  document.getElementById("registerForm").classList.remove("hidden");
  window.appTranslate?.translatePage();
}
</script>
<script src="app-nav.js"></script>
</body>
</html>
