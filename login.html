<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Логін</title>
<link rel="stylesheet" href="app.css">
<script src="language-boot.js"></script>

<style>
body {
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#0b0f1a;
font-family:Arial;
color:white;
}

.box {
background:#111;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
}

input {
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button {
width:100%;
padding:10px;
margin-top:10px;
background:orange;
border:none;
border-radius:10px;
cursor:pointer;
}

.switch {
margin-top:10px;
color:#aaa;
cursor:pointer;
}

.reset-box {
display:none;
margin-top:14px;
padding-top:14px;
border-top:1px solid #333;
}

.reset-box.visible {
display:block;
}

.reset-help {
color:#bbb;
font-size:13px;
line-height:1.45;
}

.message {
min-height:20px;
margin-top:8px;
color:#fbbf24;
font-size:13px;
line-height:1.35;
}
</style>

</head>

<body data-no-nav="true">

<div class="box">

<h2>Логін</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Пароль">

<button onclick="login()">Увійти</button>

<div class="switch" onclick="showReset()">Забув пароль?</div>
<div class="switch" onclick="goRegister()">Нема акаунта? Реєстрація</div>

<div class="reset-box" id="resetBox">
<p class="reset-help">Введіть email акаунту. Ми надішлемо код для створення нового пароля.</p>
<input id="resetEmail" type="email" placeholder="Email для відновлення">
<button id="resetStartButton" onclick="startPasswordReset()">Надіслати код</button>
<div id="resetCodeArea" style="display:none">
<input id="resetCode" inputmode="numeric" maxlength="6" placeholder="Код із листа">
<input id="resetPassword" type="password" minlength="6" placeholder="Новий пароль мінімум 6 символів">
<button id="resetVerifyButton" onclick="finishPasswordReset()">Змінити пароль</button>
</div>
<div class="message" id="resetMessage"></div>
</div>

</div>

<script>

const API_URL = "https://cryptoapp-eqc5.onrender.com";

// 🔐 якщо вже залогінений
let token = localStorage.getItem("token");
if(token){
location.href = "index.html";
}

let resetPendingToken = "";

// 🔥 LOGIN
async function login(){

let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();

if(!email || !password){
alert("Заповни всі поля");
return;
}

try {

let res = await fetch(API_URL + "/login", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

let data = await res.json();

if(data.success){

// 🔥 зберігаємо токен
localStorage.setItem("token", data.token);

// 🔥 редірект
location.href = "index.html";

}else{
alert("Невірний email або пароль");
}

}catch(err){
alert("Сервер не працює");
}

}

// 👉 перехід на реєстрацію
function goRegister(){
location.href = "terms.html";
}

function showReset(){
document.getElementById("resetBox").classList.toggle("visible");
document.getElementById("resetEmail").value = document.getElementById("email").value.trim();
document.getElementById("resetEmail").focus();
}

async function startPasswordReset(){
let email = document.getElementById("resetEmail").value.trim();
let message = document.getElementById("resetMessage");
let button = document.getElementById("resetStartButton");
if(!email){
message.textContent = "Введіть email акаунту";
return;
}
button.disabled = true;
message.textContent = "Надсилаємо код...";
try{
let res = await fetch(API_URL + "/password/reset/start", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email})
});
let data = await res.json();
if(data.success && data.pendingToken){
resetPendingToken = data.pendingToken;
document.getElementById("resetCodeArea").style.display = "block";
message.textContent = "Код надіслано на пошту. Він дійсний 10 хвилин.";
document.getElementById("resetCode").focus();
}else if(data.success){
message.textContent = "Якщо такий email є в системі, код буде надіслано.";
}else{
message.textContent = data.message === "Invalid email" ? "Введіть правильний email." : "Не вдалося надіслати код.";
}
}catch(err){
message.textContent = "Сервер не відповідає";
}finally{
button.disabled = false;
}
}

async function finishPasswordReset(){
let code = document.getElementById("resetCode").value.trim();
let password = document.getElementById("resetPassword").value;
let message = document.getElementById("resetMessage");
let button = document.getElementById("resetVerifyButton");
if(!resetPendingToken || !code || !password){
message.textContent = "Введіть код і новий пароль";
return;
}
if(password.length < 6){
message.textContent = "Пароль має містити мінімум 6 символів";
return;
}
button.disabled = true;
message.textContent = "Змінюємо пароль...";
try{
let res = await fetch(API_URL + "/password/reset/verify", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({pendingToken:resetPendingToken,code,password})
});
let data = await res.json();
if(data.success){
message.textContent = "Пароль змінено. Тепер увійдіть із новим паролем.";
document.getElementById("password").value = password;
document.getElementById("email").value = document.getElementById("resetEmail").value.trim();
resetPendingToken = "";
document.getElementById("resetCodeArea").style.display = "none";
}else{
message.textContent = data.message === "Code expired" ? "Код прострочено. Надішліть новий." : (data.message === "Weak password" ? "Пароль має містити мінімум 6 символів." : "Неправильний код.");
}
}catch(err){
message.textContent = "Сервер не відповідає";
}finally{
button.disabled = false;
}
}

</script>

<script src="app-nav.js"></script>
</body>
</html>
